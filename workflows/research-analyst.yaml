name: research-analyst
version: "1.0"
description: "Deep-dive research briefing on any topic — searches the web, reads sources, synthesizes findings, and produces a structured Markdown and HTML report."
mission: >
  You are a senior research analyst. Given a research topic or question, conduct systematic
  research across multiple web sources and provided documents, then synthesize a comprehensive,
  well-sourced briefing that a decision maker can act on immediately.

# ── Model configuration ─────────────────────────────────────────────────────────
# Swap providers/models here without touching any stage definitions.
# All three tiers are used: small for cheap planning, large for extraction,
# large for synthesis and final report writing.
model_tiers:
  small:
    provider: openrouter
    model: qwen/qwen3.6-27b
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.2
    max_tokens: 2048

  medium:
    provider: openrouter
    model: moonshotai/kimi-k2.7
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.2
    max_tokens: 8192

  large:
    provider: openrouter
    model: z-ai/glm-5.2
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.3
    max_tokens: 16384

# ── Optional: Perplexity (real-time web search built into the LLM) ────────────
# If you have a Perplexity API account (https://api.perplexity.ai), uncomment
# this tier and change the synthesize_findings model_tier to "perplexity".
# This collapses the Tavily search → fetch → synthesize chain into a single
# LLM call that searches and synthesizes in one step — lower latency, fewer
# tool calls, and Perplexity's own freshness index.
#
# perplexity:
#   provider: openai
#   base_url: https://api.perplexity.ai
#   model: sonar-pro
#   api_key_env: PERPLEXITY_API_KEY
#   temperature: 0.2
#   max_tokens: 8000

role_type_defaults:
  worker: small
  orchestrator: medium
  judge: large
  researcher: large

# ── Contract: what this workflow needs ──────────────────────────────────────────
contracts:
  inputs:
    - name: topic          # The research question or subject area (required)
    - name: focus          # Optional: specific angle or constraint ("focus on regulatory implications")
    - name: documents      # Optional: list of local file paths to include as sources
    - name: max_sources    # Optional: cap on URLs fetched (default 12)
    - name: run_id         # Injected by the harness at runtime
    - name: prior_research # Injected by continuation: block (absent on first run)
    - name: _prior_sources # Injected by memory: block (absent on first run)
    - name: _date_context  # Optional: date string for grounding queries (default: current date)
  max_iterations: 40
  max_llm_calls: 150
  timeout_hours: 2.0

checkpoint: true    # resume interrupted scans from the last completed stage

# ── Continuation: carry forward prior research for recurring topics ─────────────
# On the second run of the same topic, the synthesizer sees what was already found.
# This enables incremental research: "what's new since last week?"
continuation:
  carry_forward:
    - key: deep_research_round.decide_round.key_themes
    - key: deep_research_round.decide_round.source_count
    - key: deep_research_round.decide_round.gaps
    - key: deep_research_round.decide_round.coverage_score
  inject_as: prior_research

# ── Triggers: automate recurring research topics ────────────────────────────────
triggers:
  - type: cron
    schedule: "0 6 * * 1"    # 6am UTC every Monday — weekly topic refresh
  - type: webhook
    path: /webhook/research   # POST with {"topic": "...", "focus": "..."} to trigger

# ── Memory: remember which sources were already used ───────────────────────────
# Source deduplication across runs is handled by this memory config.
memory:
  enabled: true
  capture:
    - stage: deep_research_round
      key: decide_round.urls_fetched
      max_entries: 5    # rolling window — deduplicates sources across runs
  inject_as: _prior_sources

# ── Safety ──────────────────────────────────────────────────────────────────────
safety_mode: strict

safety_rules:
  - tool: web_search
    condition: {field: query, op: truthy, value: ""}
    action: allow
    message: "Web search allowed"
  - tool: fetch_url
    condition: {field: url, op: truthy, value: ""}
    action: allow
    message: "URL fetch allowed"
  - tool: read_document
    condition: {field: path, op: truthy, value: ""}
    action: allow
    message: "Document read allowed"
  - tool: generate_html_report
    condition: {field: run_id, op: truthy, value: ""}
    action: allow
    message: "HTML report generation allowed"
  - tool: search_reddit
    condition: {field: query, op: truthy, value: ""}
    action: allow
    message: "Reddit search allowed"
  - tool: search_youtube_videos
    condition: {field: queries, op: truthy, value: ""}
    action: allow
    message: "YouTube video search allowed"
  - tool: fetch_youtube_transcript
    condition: {field: url, op: truthy, value: ""}
    action: allow
    message: "YouTube transcript fetch allowed"

# ── Tool modules ─────────────────────────────────────────────────────────────────
# research/tools/web.py    — web_search, fetch_url, read_document, generate_html_report
# research/tools/social.py — search_reddit, search_youtube_videos, fetch_youtube_transcript
#
# Both web.py and social.py use Tavily for search (TAVILY_API_KEY required).
# Reddit requires REDDIT_CLIENT_ID + REDDIT_CLIENT_SECRET — see README for setup.
# YouTube transcripts require: pip install youtube-transcript-api (no API key needed).
# All social tools degrade gracefully if not configured — the workflow continues
# with web-only results and the social stages produce empty/error values.
tools:
  - module: research.tools.web
  - module: research.tools.social

# ── Stages ──────────────────────────────────────────────────────────────────────

stages:
  # ── 1. Decompose the research question into specific sub-questions ─────────────
  - id: decompose_query
    role:
      name: QueryPlanner
      type: orchestrator
      model_tier: large
      description: |
        Break the research topic into specific, answerable sub-questions that together
        provide comprehensive coverage of the subject.

        IMPORTANT: Today's date is {{ _date_context | default('June 2026') }}.
        When queries need a year or refer to "latest", "current", "this year", or "recent",
        use 2026 or relative wording — never a year inferred from your training data cutoff.

        Topic: {{ topic or Topic }}
        {% if focus %}Focus constraint: {{ focus }}{% endif %}

        {% if prior_research is defined and prior_research %}
        PRIOR RESEARCH CONTEXT:
        The last run covered {{ prior_research.source_count }} sources and identified
        these themes: {{ prior_research.key_themes }}.
        Known gaps from the prior run: {{ prior_research.coverage_gaps }}.
        Emphasize the gap areas and look for developments since the prior run.
        {% endif %}

        Generate 5–8 specific sub-questions. Each should be independently answerable
        and together they should leave no major aspect of the topic unaddressed.

        Categorize each by source type:
        - "web": current events, product info, company news
        - "academic": research findings, technical papers
        - "news": recent reporting, press coverage
        - "official": government, regulatory, standards bodies
        - "data": statistics, market sizing, numeric benchmarks

        Also classify the overall research category — this controls how the final
        report is formatted and styled. Pick the single best fit:
        - "product": best-of rankings, product reviews, purchase recommendations
        - "comparison": side-by-side comparison of 2+ options (tools, frameworks, services)
        - "howto": step-by-step guides, tutorials, how-to instructions
        - "factcheck": verifying a specific claim, debunking, "is X true?"
        - "landscape": industry overviews, market analysis, state-of-the-art briefings
        If uncertain, use "landscape" as the default.

        Define success criteria: what would a complete, high-quality answer to this
        research question look like? What key aspects must be covered, what data points
        are essential, and what perspectives cannot be missing? This guides downstream
        evaluation of research completeness.
    output_mode: guided_json
    output_schema:
      type: object
      required: [sub_questions, scope_summary, category, success_criteria]
      properties:
        sub_questions:
          type: array
          items:
            type: object
            required: [index, question, rationale, source_type]
            properties:
              index:       {type: number}
              question:    {type: string}
              rationale:   {type: string}
              source_type: {type: string, enum: [web, academic, news, official, data]}
        scope_summary:
          type: string    # one paragraph describing what this research will cover
        category:
          type: string
          enum: [product, comparison, howto, factcheck, landscape]
          description: "Research category that controls report formatting"
        success_criteria:
          type: string
          description: "What a complete answer looks like — key aspects, essential data, required perspectives"

  # ── 2. Deep research via iterative subagent ────────────────────────────────────
  # Runs research-round.yaml as a subagent in a loop. Each iteration performs a
  # full search→extract→synthesize→decide cycle. The loop continues until coverage
  # is adequate (continue_research == false) or max_iterations is reached.
  #
  # carry_forward passes the judge's evaluation (gaps, themes, coverage score,
  # and accumulated URLs/queries) into the next iteration so it can:
  #   - Focus queries on the identified gaps
  #   - Deduplicate against URLs already fetched
  #   - Build on themes already established
  - id: deep_research_round
    depends_on: [decompose_query]
    subagent_spec: workflows/research-round.yaml
    loop:
      max_iterations: 3
      until: "{{ decide_round.continue_research == false }}"
      carry_forward:
        - decide_round.gaps
        - decide_round.key_themes
        - decide_round.coverage_score
        - decide_round.urls_fetched
        - decide_round.queries_used
        - decide_round.source_count
      iteration_var: _iteration
    output_max_chars: 50000

  # ── 10. Write the final research briefing ─────────────────────────────────────
  - id: write_report
    depends_on: [deep_research_round]
    signature:
      input:
        topic: Research topic
        focus: Optional focus constraint
        run_id: Run identifier for citation
        decompose_query: Sub-questions, scope summary, and success criteria
        deep_research_round: Research subagent output (final iteration) with decide_round containing report, gaps, and coverage
        prior_research: "Prior run summary — absent if this is the first run"
    role:
      name: Writer
      type: worker
      model_tier: large
      description: |
        Write a comprehensive research briefing in Markdown.

        IMPORTANT LENGTH REQUIREMENT: The report MUST be at least 800 words.
        Do NOT submit a report under 800 words — if the research data is thin,
        expand with more detailed evidence, examples, and citations. Do not pad
        with filler — add substantive content drawn from the research findings.

        CRITICAL: Do NOT truncate your response. Write the COMPLETE report.
        If you find yourself running out of space, prioritize completing all
        sections over writing perfect prose. An incomplete report is worse
        than a slightly rough but complete one.

        Topic: {{ topic or Topic }}
        {% if focus %}Focus: {{ focus }}{% endif %}
        Run ID: {{ run_id }}

        The research synthesis is in deep_research_round.decide_round.report.
        Remaining gaps are in deep_research_round.decide_round.gaps.
        Coverage score: {{ deep_research_round.decide_round.coverage_score }}

        ACCURACY RULES — never violate:
        - Every factual claim must be traceable to a source. Use inline citations: [Source Title](url)
        - Do not invent statistics, dates, or named entities not present in the report
        - Contested claims must be flagged: "According to X, though Y disputes this..."
        - Data points must be quoted exactly as found — do not round or paraphrase numbers

        {% if prior_research is defined and prior_research %}
        DELTA NOTE: Include a "What's New" section comparing to the prior research run,
        which covered these themes: {{ prior_research.key_themes }}.
        Highlight findings that represent new developments since the prior run.
        {% endif %}

        Structure the report exactly as follows (do NOT include a title heading — the
        HTML template adds the title automatically):

        {% set report_category = decompose_query.category %}

        {% if report_category == 'product' %}
        PRODUCT REVIEW FORMAT — structure the report as:
        ### Executive Summary
        3–4 sentences. Top pick and key differentiator.

        ### Quick Comparison
        Side-by-side table with the top options. Columns: Product, Price, Key Strength, Best For.

        ### Detailed Reviews
        One ### subsection per product. For each: overview, strengths, weaknesses, pricing, and a
        verdict line (**Best for X** or **Best value for Y**).

        ### Verdict
        Two picks: **Best Overall** and **Best Value**, each with a one-sentence justification.

        ### Key Findings
        Numbered list with confidence indicators.

        ### Contradictions and Open Questions
        Where do sources disagree? What remains unclear?

        ### Appendix: Sources Consulted
        Organized by credibility tier with inline citations.

        {% elif report_category == 'comparison' %}
        COMPARISON FORMAT — structure the report as:
        ### Executive Summary
        3–4 sentences. The key differentiator and bottom-line recommendation.

        ### At a Glance
        Comparison table covering all options. Columns: Feature/Aspect, then one column per option.

        ### By Option
        One ### subsection per option. For each: strengths, weaknesses, ideal use case, pricing.

        ### Head-to-Head
        For each major comparison dimension, a ### subsection comparing all options side by side.

        ### Verdict
        **Best For** picks for each major use case (e.g., "Best for teams", "Best for solo devs").

        ### Key Findings and Contradictions

        ### Appendix: Sources Consulted

        {% elif report_category == 'howto' %}
        HOW-TO GUIDE FORMAT — structure the report as:
        ### Executive Summary
        2–3 sentences. What the reader will learn and approximate time required.

        ### Prerequisites
        What you need before starting: tools, accounts, knowledge, costs.

        ### Quick Guide
        Numbered steps (5–8 steps) — the concise version for someone who already knows the basics.

        ### Step-by-Step Walkthrough
        One ### subsection per step. For each: what to do, why, common mistakes (in blockquotes),
        and pro tips. Use numbered lists within steps.

        ### Troubleshooting
        Common problems and solutions in a table: Problem | Solution.

        ### Appendix: Sources Consulted

        {% elif report_category == 'factcheck' %}
        FACT-CHECK FORMAT — structure the report as:
        ### The Claim
        State the specific claim being investigated, its origin, and who is making it.

        ### Evidence For
        Sources and data supporting the claim. Use inline citations.

        ### Evidence Against
        Sources and data contradicting the claim. Use inline citations.

        ### Verdict
        One of: **Supported** (strong evidence), **Mixed** (some support, important caveats),
        **Unsupported** (evidence contradicts), **Inconclusive** (insufficient evidence).

        ### Nuance and Caveats
        Important context, scope limitations, and edge cases.

        ### Appendix: Sources Consulted

        {% else %}
        {% set report_category = 'landscape' %}
        DEFAULT / LANDSCAPE FORMAT — structure the report as:
        ### Executive Summary
        3–4 sentences. What was researched, the single most important finding,
        and the confidence level. Write this for a busy decision maker.

        ### Key Findings
        Numbered list. Each finding: one bold claim sentence, then 1–2 sentences of
        supporting evidence with inline citations. Order by importance.
        Use confidence indicators: **[High confidence]**, **[Medium confidence]**, **[Uncertain]**

        {% if prior_research is defined and prior_research %}
        ### What's New Since Last Analysis
        Bullet list of findings that represent genuinely new information vs. the prior run.
        {% endif %}

        ### By Sub-Question
        One subsection per sub-question from decompose_query.sub_questions.
        For each: the question as a heading, a direct answer, supporting evidence, and confidence.

        ### Contradictions and Open Questions
        Where do sources disagree? What remains unclear? What would a follow-up study examine?

        ### Source Quality Assessment
        A brief table:
        | Source | Credibility | Key Contribution |

        ### Appendix: Sources Consulted
        Organize by credibility tier. Under each tier heading, list each source as:
        - **[Source Title](url)** — One sentence describing what this source contributed.

        Example:
        #### High Credibility
        - **[Paper Title](https://arxiv.org/...)** — Peer-reviewed analysis of uncertainty propagation in multi-step LLM agents.

        #### Medium Credibility
        - **[Article Title](https://...)** — Vendor survey on enterprise adoption rates and ROI expectations.
        {% endif %}

        ### Research Metadata
        - Topic: {{ topic or Topic }}
        - Run ID: {{ run_id }}
        - Sources consulted: {{ deep_research_round.decide_round.source_count }}
        - Sub-questions addressed: {{ decompose_query.sub_questions | length }}
        - Coverage score: {{ deep_research_round.decide_round.coverage_score }}
        - Coverage gaps: {{ deep_research_round.decide_round.gaps | join('; ') if deep_research_round.decide_round.gaps else 'None identified' }}
    output_mode: guided_json
    output_schema:
      type: object
      required: [report, word_count, source_count]
      properties:
        report:       {type: string}
        word_count:   {type: number}
        source_count: {type: number}
    output_max_chars: 16000

  # ── 11. Validate the report for quality, accuracy, and completeness ───────────
  - id: validate_report
    depends_on: [write_report]
    signature:
      input:
        topic: Research topic
        write_report: The draft report
        deep_research_round: Iterative research subagent output with decide_round containing synthesis
    role:
      name: Editor
      type: judge
      model_tier: medium
      description: |
        Review this research report before it is delivered.

        Topic: {{ topic or Topic }}
        Draft report: {{ write_report.report }}
        Research synthesis: {{ deep_research_round.decide_round }}

        Check for:
        1. Unsupported claims — any assertion not traceable to a source in the synthesis
        2. Overstated confidence — claims presented as established that the synthesis marked uncertain
        3. Missing coverage — sub-questions with answers in the synthesis that were omitted from the report
        4. Internal contradictions — statements that contradict each other within the report
        5. Missing source citations — paragraphs with factual claims but no [citation](url)

        If the report is acceptable, set accept=true with confidence >= 0.8.
        If there are issues, describe each one precisely so the Writer can fix it.
    output_mode: guided_json
    output_schema:
      type: object
      required: [accept, confidence, issues, feedback]
      properties:
        accept:     {type: boolean}
        confidence: {type: number, minimum: 0.0, maximum: 1.0}
        issues:
          type: array
          items: {type: string}
        feedback: {type: string}
    on_fail:
      loop:
        stage: validate_report
        max: 2

  # ── 12. Render the report as a self-contained HTML file ───────────────────────
  # Note: tool_call.args only renders Jinja2 in top-level string values.
  # Nested dict values are NOT rendered, so stats must be passed as flat
  # individual args and assembled in the handler.
  - id: generate_html
    depends_on: [validate_report]
    tool_call:
      name: generate_html_report
      args:
        topic: "{{ topic or Topic or '' }}"
        markdown: "{{ write_report.report }}"
        run_id: "{{ run_id }}"
        sources: "{{ deep_research_round.decide_round.urls_fetched }}"
        source_count: "{{ deep_research_round.decide_round.source_count }}"
        queries_used: "{{ deep_research_round.decide_round.queries_used }}"
        rounds: "{{ deep_research_round.decide_round.iteration_num }}"
        category: "{{ decompose_query.category }}"

  # ── Post-run: self-analysis of research quality ───────────────────────────────
  # Runs after all normal stages complete, with access to the full run transcript.
  # Suggests improvements to search strategy, source selection, and prompts.
  - id: self_analyst
    post_run: true
    fail_as_value: true
    depends_on: []
    signature:
      input:
        topic: Research topic
        deep_research_round: Iterative research subagent output
        validate_report: Editor's quality assessment of the report
        write_report: Final report with word count and source count
    role:
      name: ResearchDirector
      type: judge
      model_tier: medium
      description: |
        You are reviewing a completed research run to identify quality improvements.

        Topic: {{ topic or Topic }}
        Coverage score: {{ deep_research_round.decide_round.coverage_score }}
        Remaining gaps: {{ deep_research_round.decide_round.gaps }}
        Key themes: {{ deep_research_round.decide_round.key_themes }}
        Sources consulted: {{ deep_research_round.decide_round.source_count }}
        Editor assessment: accept={{ validate_report.accept }}, confidence={{ validate_report.confidence }}, issues={{ validate_report.issues }}
        Report: {{ write_report.word_count }} words, {{ write_report.source_count }} sources cited

        Evaluate:
        1. Research depth — did multiple iterations meaningfully improve coverage, or were later rounds redundant?
        2. Source quality — were the right URLs chosen? Any obvious gaps?
        3. Synthesis depth — did the iterative approach surface non-obvious connections?
        4. Report quality — what did the editor flag? Is the acceptance confidence high or low?
        5. Structural improvements — what would make the next run produce a better briefing?

        Return specific, actionable improvements for the next run.
    output_mode: guided_json
    output_schema:
      type: object
      required: [issues, suggestions, confidence, stages_flagged]
      properties:
        issues:
          type: array
          items: {type: string}
        suggestions:
          type: array
          items: {type: string}
        confidence: {type: number, minimum: 0.0, maximum: 1.0}
        stages_flagged:
          type: array
          items: {type: string}
